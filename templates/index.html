<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTN AI Security Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#000;
color:white;
margin:0;
text-align:center;
}

h1{
color:#ffd700;
font-size:32px;
margin-top:30px;
text-shadow:0 0 15px #ffd700;
}

.card{
background:rgba(255,215,0,0.05);
border:1px solid #ffd700;
box-shadow:0 0 20px #ffd700;
border-radius:20px;
width:90%;
max-width:500px;
margin:40px auto;
padding:30px;
}

select,button{
padding:12px 20px;
border-radius:30px;
border:none;
margin:10px;
font-weight:bold;
}

select{
background:black;
color:#ffd700;
border:1px solid #ffd700;
}

button{
background:linear-gradient(45deg,#ffd700,#ffae00);
cursor:pointer;
}

#emergencyBtn{
background:red;
color:white;
display:none;
box-shadow:0 0 20px red;
}

.status{
margin-top:15px;
font-size:18px;
}

.green{color:lightgreen;}
.yellow{color:yellow;}
.red{color:red;}

</style>
</head>

<body>

<h1>🚀 SafeTN AI Live Security</h1>

<div class="card">

<h3>Select Vehicle Type</h3>

<select id="vehicle">
<option value="bike">Bike</option>
<option value="car">Car</option>
<option value="bus">Bus</option>
</select>

<p><b>📍 Area:</b> <span id="area">Waiting...</span></p>
<p><b>Speed:</b> <span id="speed">0</span> km/h</p>

<p class="status">AI Risk: <span id="risk">Waiting...</span></p>
<p class="status">AI Suggestion: <span id="suggestion">---</span></p>

<button onclick="startRealGPS()">Start Live GPS</button>
<button onclick="stopRealGPS()">Stop GPS</button>

<button id="emergencyBtn" onclick="sendEmergency()">🚨 Emergency Alert</button>

</div>

<script>

let watchId;
let currentData = {};

function startRealGPS(){

if(navigator.geolocation){

watchId = navigator.geolocation.watchPosition(function(position){

let lat = position.coords.latitude;
let long = position.coords.longitude;
let speed = position.coords.speed || 0;

speed = speed * 3.6;
document.getElementById("speed").innerHTML = speed.toFixed(2);

sendLocationToServer(lat,long,speed);

},
function(error){
alert("GPS Error: " + error.message);
},
{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});

}else{
alert("Geolocation not supported");
}
}

function stopRealGPS(){
navigator.geolocation.clearWatch(watchId);
}

function sendLocationToServer(lat,long,speed){

let vehicleType = document.getElementById("vehicle").value;

fetch("/location",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
latitude:lat,
longitude:long,
speed:speed,
vehicle:vehicleType
})
})
.then(response=>response.json())
.then(data=>{

document.getElementById("area").innerHTML = data.area;
document.getElementById("risk").innerHTML = data.risk_score;
document.getElementById("suggestion").innerHTML = data.suggestion;

currentData = {
vehicle: vehicleType,
speed: speed.toFixed(2),
area: data.area,
risk: data.risk_score
};

if(data.risk_score.includes("HIGH")){
document.getElementById("risk").className="red";
document.getElementById("emergencyBtn").style.display="inline-block";
}
else if(data.risk_score.includes("MEDIUM")){
document.getElementById("risk").className="yellow";
document.getElementById("emergencyBtn").style.display="none";
}
else{
document.getElementById("risk").className="green";
document.getElementById("emergencyBtn").style.display="none";
}

});
}

function sendEmergency(){

fetch("/emergency",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(currentData)
})
.then(response=>response.json())
.then(data=>{
alert(data.message);
});

}

</script>

</body>
</html>
